<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo-icon">🚀</div>
            <h1>Create Account</h1>
            <p>Join the conversation today</p>
        </div>

        <form (ngSubmit)="onRegister()" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" [(ngModel)]="username" name="username"
                        placeholder="Choose a username" autocomplete="username" />
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="Enter your email"
                        autocomplete="email" />
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" [(ngModel)]="password" name="password"
                        placeholder="Min 6 characters" autocomplete="new-password" />
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔐</span>
                    <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword"
                        placeholder="Re-enter your password" autocomplete="new-password" />
                </div>
            </div>

            <div class="error-message" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button type="submit" class="btn-primary" [disabled]="isLoading">
                <span *ngIf="!isLoading">Create Account</span>
                <span *ngIf="isLoading" class="spinner"></span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a routerLink="/login">Sign In</a></p>
        </div>
    </div>
</div>
